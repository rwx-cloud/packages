base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: base
    call: ${{ init.package-digest }}

  - key: test-user
    use: base
    run: |
      cat /etc/os-release
      # Ubuntu 24.04+ ships a default `ubuntu` user at UID 1000 which our
      # base config preserves. On older Ubuntu and on Debian, UID 1000 is
      # unused and our base config creates an `rwx` user there.
      case "${{ init.base-image }}" in
        ubuntu:24.04|ubuntu:26.04) expected_user=ubuntu ;;
        *) expected_user=rwx ;;
      esac
      test "$(whoami)" == "$expected_user"
      test "$(id -u)" == "1000"
      test "$(sudo whoami)" == "root"

  - key: test-docker
    use: base
    docker: true
    run: docker run hello-world
