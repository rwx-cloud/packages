name: google-cloud/auth-oidc
version: 2.0.0
description: Authenticate to Google Cloud with OIDC and Workload Identity Federation
source_code_url: https://github.com/rwx-cloud/packages/tree/main/google-cloud/auth-oidc
issue_tracker_url: https://github.com/rwx-cloud/packages/issues

parameters:
  workload-identity-provider:
    description: "The full identifier of the Workload Identity Provider"
    required: true
  service-account:
    description: "The identifier of the Google Cloud service account which will be impersonated by the generated OIDC"
    required: false
  service-account-token-lifetime-seconds:
    description: "Lifetime duration of the service account access token in seconds"
    required: false
  audience:
    description: "The generated token's `aud` parameter, defaults to the value of `workload-identity-provider`"
    required: false
  project-id:
    description: "The default project to select once authenticated"
    required: false
  oidc-token-env-var:
    description: "The environment variable that contains the OIDC token."
    default: "GCP_OIDC_TOKEN"

tasks:
  - key: produce-auth-hooks
    run: |
      set -ueo pipefail

      BEFORE_HOOK_TEMPLATE="$RWX_PACKAGES_PATH/auth-login.template.txt"
      BEFORE_HOOK="$RWX_HOOKS_BEFORE_TASK/gcp-auth-oidc-login.sh"
      AFTER_HOOK="$RWX_HOOKS_AFTER_TASK/gcp-auth-oidc-login.sh"

      awk \
        -v WORKLOAD_IDENTITY_PROVIDER="${{ params.workload-identity-provider }}" \
        -v SERVICE_ACCOUNT="${{ params.service-account }}" \
        -v SERVICE_ACCOUNT_TOKEN_LIFETIME_SECONDS="${{ params.service-account-token-lifetime-seconds }}" \
        -v AUDIENCE="${{ params.audience }}" \
        -v PROJECT_ID="${{ params.project-id }}" \
        -v OIDC_TOKEN_ENV_VAR="${{ params.oidc-token-env-var }}" \
      '{
          gsub("%{{WORKLOAD_IDENTITY_PROVIDER}}", WORKLOAD_IDENTITY_PROVIDER);
          gsub("%{{SERVICE_ACCOUNT}}", SERVICE_ACCOUNT);
          gsub("%{{SERVICE_ACCOUNT_TOKEN_LIFETIME_SECONDS}}", SERVICE_ACCOUNT_TOKEN_LIFETIME_SECONDS);
          gsub("%{{AUDIENCE}}", AUDIENCE);
          gsub("%{{PROJECT_ID}}", PROJECT_ID);
          gsub("%{{OIDC_TOKEN_ENV_VAR}}", OIDC_TOKEN_ENV_VAR);
          print
      }' "$BEFORE_HOOK_TEMPLATE" > "$BEFORE_HOOK"

      bash -n "$BEFORE_HOOK" || { echo "Generated before hook script has syntax errors."; exit 1; }

      cat <<'EOF' > "$AFTER_HOOK"
      #!/bin/bash
      set -ueo pipefail
      GCP_SKIP_AUTH="${GCP_SKIP_AUTH:-}"
      if [ -n "$GCP_SKIP_AUTH" ]; then
        exit 0
      fi
      echo 'Logging out of gcloud'
      gcloud auth revoke 2>/dev/null || true
      EOF

      chmod +x "$BEFORE_HOOK"
      chmod +x "$AFTER_HOOK"
