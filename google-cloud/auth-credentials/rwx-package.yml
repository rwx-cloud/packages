name: google-cloud/auth-credentials
version: 2.0.0
description: Authenticate to Google Cloud with credentials JSON
source_code_url: https://github.com/rwx-cloud/packages/tree/main/google-cloud/auth-credentials
issue_tracker_url: https://github.com/rwx-cloud/packages/issues

parameters:
  project-id:
    description: "The default project to select once authenticated"
    required: false
  credentials-json-env-var:
    description: "The environment variable that contains the credentials JSON."
    default: "GCP_CREDENTIALS_JSON"

tasks:
  - key: produce-auth-hooks
    run: |
      set -ueo pipefail

      BEFORE_HOOK_TEMPLATE="$RWX_PACKAGES_PATH/auth-login.template.txt"
      BEFORE_HOOK="$RWX_HOOKS_BEFORE_TASK/gcp-auth-login.sh"
      AFTER_HOOK="$RWX_HOOKS_AFTER_TASK/gcp-auth-login.sh"

      awk \
        -v PROJECT_ID="${{ params.project-id }}" \
        -v CREDENTIALS_JSON_ENV_VAR="${{ params.credentials-json-env-var }}" \
      '{
          gsub("%{{PROJECT_ID}}", PROJECT_ID);
          gsub("%{{CREDENTIALS_JSON_ENV_VAR}}", CREDENTIALS_JSON_ENV_VAR);
          print
      }' "$BEFORE_HOOK_TEMPLATE" > "$BEFORE_HOOK"

      bash -n "$BEFORE_HOOK" || { echo "Generated before hook script has syntax errors."; exit 1; }

      cat <<'EOF' > "$AFTER_HOOK"
      #!/bin/bash
      set -ueo pipefail
      GCP_SKIP_AUTH="${GCP_SKIP_AUTH:-}"
      if [ -n "$GCP_SKIP_AUTH" ]; then
        exit 0
      fi
      echo 'Logging out of gcloud'
      gcloud auth revoke 2>/dev/null || true
      EOF

      chmod +x "$BEFORE_HOOK"
      chmod +x "$AFTER_HOOK"
