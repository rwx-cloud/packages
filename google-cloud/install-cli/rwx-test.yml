base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: system-packages
    run: |
      # On bases with `config: none` the RWX tooling (curl, sudo, ...) is not
      # installed and the run executes as root. The package downloads and
      # extracts the CLI, so ensure curl (with CA certs) and tar are present.
      if ! command -v curl >/dev/null 2>&1 || ! command -v tar >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then
          apt-get -y update
          apt-get -y install curl ca-certificates tar
          apt-get -y clean
        else
          echo "Unsupported package manager; need curl and tar installed" >&2
          exit 1
        fi
      fi

  - key: test-default
    use: system-packages
    call: ${{ init.package-digest }}

  - key: test-default--assert
    use: test-default
    run: gcloud --version | grep '^Google Cloud SDK [0-9.]\+$'

  - key: test-specified
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      cli-version: "462.0.1"
  - key: test-specified--assert
    use: test-specified
    run: gcloud --version | grep '^Google Cloud SDK 462.0.1$'

  - key: test-components
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      components: "bigtable cloud-sql-proxy"
  - key: test-components--assert
    use: test-components
    run: |
      component_output=$(gcloud components list --only-local-state)
      echo "$component_output"
      echo "$component_output" | grep 'bigtable'
      echo "$component_output" | grep 'cloud-sql-proxy'
