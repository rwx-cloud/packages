base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: system-packages
    run: |
      # On bases with `config: none` the RWX tooling (curl, sudo, ...) is not
      # installed and the run executes as root. The package needs curl to
      # download rustup and gpg to verify its signature, so ensure both are
      # present.
      if ! command -v curl >/dev/null 2>&1 || ! command -v gpg >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then
          apt-get -y update
          apt-get -y install curl ca-certificates gnupg
          apt-get -y clean
        else
          echo "Unsupported package manager; need curl and gpg installed" >&2
          exit 1
        fi
      fi

  - key: install-1-83-0
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      rust-version: 1.83.0

  - key: install-1-83-0--assert
    use: install-1-83-0
    run: rustc --version | grep "1.83.0"

  - key: install-1-0-0
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      rust-version: 1.0.0

  - key: install-1-0-0--assert
    use: install-1-0-0
    run: rustc --version | grep "1.0.0"
