on:
  cli:
    init:
      sha: ${{ event.git.sha }}
      publish: false

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  - key: code
    call: git/clone 2.0.6
    with:
      repository: https://github.com/rwx-cloud/packages.git
      ref: ${{ init.sha }}
      preserve-git-dir: true

  - key: rwx-cli
    call: rwx/install-cli 4.0.3

  - key: check-packages
    use: [rwx-cli, code]
    run: |
      package_file="$DIRECTORY/rwx-package.yml"
      cp "$package_file" "$package_file.before"
      rwx packages update "$package_file"
      if ! diff "$package_file.before" "$package_file"; then
        echo ""
        echo "ERROR: Package dependencies are outdated in $package_file"
        echo "Run 'rwx packages update $package_file' locally and commit the result."
        exit 1
      fi
      echo "All package dependencies are up to date."
    filter:
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}

  - key: timestamp
    use: code
    run: |
      latest_timestamp=$(git ls-files -z $DIRECTORY | xargs -0 -n1 -I{} -- git log -1 --date=format:"%Y%m%d%H%M" --format="%ad" -- {} | sort | tail -n 1)
      echo -n "$latest_timestamp" | tee $RWX_VALUES/timestamp
    filter:
      - .git
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}

  - key: go
    call: golang/install 1.2.1
    with:
      go-version: "1.23.3"

  - key: build
    use: [go, code]
    run: |
      cd $DIRECTORY
      if [[ -f build/run.sh ]]; then
        echo "Running build script"
        ./build/run.sh
      else
        echo "No build script"
      fi
    filter:
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}

  - key: package
    use: [build]
    call: 9594e0f1eba63f75513d432a07a440828dd41f6b01b48206e57c9cfc6313bd72
    with:
      directory: ${{ init.directory }}
      timestamp: ${{ tasks.timestamp.values.timestamp }}

  - key: generate-test
    use: [code]
    run: |
      if [[ -f "$DIRECTORY/rwx-test-base.json" ]]; then
        jq '[.[] | select(has("image"))]' "$DIRECTORY/rwx-test-base.json" | tee $RWX_VALUES/base-images
        jq '[.[] | select(has("os"))]' "$DIRECTORY/rwx-test-base.json" | tee $RWX_VALUES/base-images-legacy
      else
        echo '[{"image": "ubuntu:24.04", "config": "rwx/base 1.0.0", "arch": "x86_64"}]' | tee $RWX_VALUES/base-images
        echo '[]' | tee $RWX_VALUES/base-images-legacy
      fi
      echo -n $(jq 'length > 0' $RWX_VALUES/base-images) > $RWX_VALUES/any-base-images
      echo -n $(jq 'length > 0' $RWX_VALUES/base-images-legacy) > $RWX_VALUES/any-base-images-legacy
      cp "$DIRECTORY/rwx-test.yml" test-run.yml
      cp "$DIRECTORY/rwx-test.yml" test-run-legacy.yml
      sed -i 's/image: \${{ init.base-image }}/os: \${{ init.base-os }}/' test-run-legacy.yml
      sed -i 's/config: \${{ init.base-config }}/tag: \${{ init.base-tag }}/' test-run-legacy.yml
    filter:
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}
    outputs:
      artifacts:
        - key: test-run
          path: test-run.yml
        - key: test-run-legacy
          path: test-run-legacy.yml

  - key: test
    if: ${{ tasks.generate-test.values.any-base-images }}
    call: ${{ tasks.generate-test.artifacts.test-run }}
    parallel:
      values: ${{ tasks.generate-test.values.base-images }}
    init:
      package-digest: ${{ tasks.package.values.digest }}
      base-image: ${{ parallel.image }}
      base-config: ${{ parallel.config }}
      base-arch: ${{ parallel.arch }}

  - key: test-legacy
    if: ${{ tasks.generate-test.values.any-base-images-legacy }}
    call: ${{ tasks.generate-test.artifacts.test-run-legacy }}
    parallel:
      values: ${{ tasks.generate-test.values.base-images-legacy }}
    init:
      package-digest: ${{ tasks.package.values.digest }}
      base-os: ${{ parallel.os }}
      base-tag: ${{ parallel.tag }}
      base-arch: ${{ parallel.arch }}

  - key: publish
    if: ${{ init.publish }}
    after: ${{ (test.succeeded || test.skipped) && (test-legacy.succeeded || test-legacy.skipped) }}
    run: |
      curl \
        --request POST \
        --fail-with-body \
        --header "Authorization: Bearer $RWX_ACCESS_TOKEN" \
        --header 'Accept: application/json' \
        --header 'Content-Type: application/json' \
        --data '{ "digest": "${{ tasks.package.values.digest }}" }' \
        https://cloud.rwx.com/mint/api/leaves/publish
    env:
      RWX_ACCESS_TOKEN:
        cache-key: excluded
        value: ${{ vaults.mint_leaves_development.secrets.RWX_ACCESS_TOKEN }}
