on:
  cli:
    init:
      sha: ${{ event.git.sha }}
      publish: false

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  - key: code
    call: git/clone 2.0.3
    with:
      repository: https://github.com/rwx-cloud/packages.git
      ref: ${{ init.sha }}
      preserve-git-dir: true

  - key: timestamp
    use: code
    run: |
      latest_timestamp=$(git ls-files -z $DIRECTORY | xargs -0 -n1 -I{} -- git log -1 --date=format:"%Y%m%d%H%M" --format="%ad" {} | sort | tail -n 1)
      echo -n "$latest_timestamp" | tee $RWX_VALUES/timestamp
    filter:
      - .git
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}

  - key: go
    call: golang/install 1.1.5
    with:
      go-version: "1.23.3"

  - key: build
    use: [go, code]
    run: |
      cd $DIRECTORY
      if [[ -f build/run.sh ]]; then
        echo "Running build script"
        ./build/run.sh
      else
        echo "No build script"
      fi
    filter:
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}

  - key: package
    use: [build]
    call: 9594e0f1eba63f75513d432a07a440828dd41f6b01b48206e57c9cfc6313bd72
    with:
      directory: ${{ init.directory }}
      timestamp: ${{ tasks.timestamp.values.timestamp }}

  - key: generate-test
    use: [code]
    run: |
      if [[ -f "$DIRECTORY/rwx-test-base.json" ]]; then
        cat "$DIRECTORY/rwx-test-base.json" | tee $RWX_VALUES/base-images
      else
        echo '[{"image": "ubuntu:24.04", "config": "rwx/base 1.0.0", "arch": "x86_64"}]' | tee $RWX_VALUES/base-images
      fi
      cp "$DIRECTORY/rwx-test.yml" test-run.yml
    filter:
      - ${{ init.directory }}
    env:
      DIRECTORY: ${{ init.directory }}
    outputs:
      artifacts:
        - key: test-run
          path: test-run.yml

  - key: test
    call: ${{ tasks.generate-test.artifacts.test-run }}
    parallel:
      values: ${{ tasks.generate-test.values.base-images }}
    init:
      package-digest: ${{ tasks.package.values.digest }}
      base-image: ${{ parallel.image }}
      base-config: ${{ parallel.config }}
      base-arch: ${{ parallel.arch }}

  - key: publish
    if: ${{ init.publish }}
    after: test
    run: |
      curl \
        --request POST \
        --fail-with-body \
        --header "Authorization: Bearer $RWX_ACCESS_TOKEN" \
        --header 'Accept: application/json' \
        --header 'Content-Type: application/json' \
        --data '{ "digest": "${{ tasks.package.values.digest }}" }' \
        https://cloud.rwx.com/mint/api/leaves/publish
    env:
      RWX_ACCESS_TOKEN:
        cache-key: excluded
        value: ${{ vaults.mint_leaves_development.secrets.RWX_ACCESS_TOKEN }}
