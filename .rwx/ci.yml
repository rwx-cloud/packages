on:
  github:
    pull_request:
      init:
        qualified-base-ref: origin/${{ event.github.pull_request.pull_request.base.ref }}
        unqualified-base-ref: ${{ event.github.pull_request.pull_request.base.ref }}
        branch: ${{ event.git.branch }}
        publish: false
        sha: ${{ event.git.sha }}
    push:
      if: ${{ event.git.branch == 'main' }}
      init:
        qualified-base-ref: ${{ event.github.push.before }}
        unqualified-base-ref: ${{ event.github.push.before }}
        branch: ${{ event.git.branch }}
        publish: true
        sha: ${{ event.git.sha }}

concurrency-pools:
  - id: rwx-cloud/packages:branch-${{ init.branch }}
    if: ${{ init.branch != 'main' }}
    capacity: 1
    on-overflow: cancel-running

tool-cache:
  vault: rwx-packages-main

base:
  image: ubuntu:24.04
  config: rwx/base 1.0.0

tasks:
  - key: checkout
    call: git/clone 2.0.5
    with:
      preserve-git-dir: true
      repository: https://github.com/rwx-cloud/packages.git
      ref: ${{ init.sha }}
      github-token: ${{ github['rwx-cloud'].token }}

  - key: tool-versions
    use: checkout
    call: rwx/tool-versions 1.0.6
    filter:
      - .tool-versions

  - key: node
    use: [checkout, tool-versions]
    call: nodejs/install 1.1.12
    with:
      node-version: ${{ tasks.tool-versions.values.nodejs }}
    filter:
      - .tool-versions

  - key: npm-install
    use: node
    run: npm ci
    filter:
      - package.json
      - package-lock.json
      - .tool-versions

  - key: spellcheck
    use: npm-install
    run: npm run spellcheck

  - key: check-version-consistency
    use: checkout
    run: |
      packages=$(ls */*/rwx-package.yml | cut -d/ -f1,2)
      while read -r package; do
        echo "Checking $package..."
        version=$(grep '^version:' $package/rwx-package.yml | awk '{print $2}')
        major_version=$(echo "$version" | cut -d. -f1)
        previous_major_version=$(("$major_version" - 1))
        echo "$version"
        set +e
        mismatches=$(grep "call: $package" $package/README.md | grep -v "$version" | grep -E -v "call: $package $previous_major_version\\.[0-9]+\\.[0-9]+")
        set -e
        if [[ -n "$mismatches" ]]; then
          echo "$mismatches"
          exit 1
        fi
      done <<< "$packages"
    filter:
      - "**/README.md"
      - "**/rwx-package.yml"

  - key: detect-changes
    use: [checkout]
    run: |
      git fetch origin $UNQUALIFIED_BASE_REF
      changed_files=$(git diff --name-only $QUALIFIED_BASE_REF $SHA)

      packages="[]"
      echo -n "false" > $RWX_VALUES/any-packages-changed
      for pkg_file in $(ls */*/rwx-package.yml | sort); do
        dir=$(dirname "$pkg_file")
        if echo "$changed_files" | grep -q "^${dir}/"; then
          packages=$(echo "$packages" | jq -c --arg d "$dir" '. + [{"directory": $d}]')
          echo -n "true" > $RWX_VALUES/any-packages-changed
        fi
      done

      echo "Changed packages: $packages"
      echo -n "$packages" > $RWX_VALUES/packages
    env:
      QUALIFIED_BASE_REF: ${{ init.qualified-base-ref }}
      UNQUALIFIED_BASE_REF: ${{ init.unqualified-base-ref }}
      SHA: ${{ init.sha }}

  - key: packages
    if: ${{ tasks.detect-changes.values.any-packages-changed }}
    call: ${{ run.dir }}/package.yml
    parallel:
      values: ${{ tasks.detect-changes.values.packages }}
    init:
      directory: ${{ parallel.directory }}
      sha: ${{ init.sha }}
      publish: ${{ init.publish }}
