base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: test-default
    call: ${{ init.package-digest }}

  - key: test-default--assert
    use: test-default
    run: nsc version | grep -q '^version v0'

  - key: test-specified
    call: ${{ init.package-digest }}
    with:
      cli-version: "0.0.436"

  - key: test-specified--assert
    use: test-specified
    run: nsc version | grep -q '^version v0\.0\.436 '
