- key: install-3-14-3
  call: $LEAF_DIGEST
  with:
    python-version: 3.14.3

- key: install-3-14-3--assert
  use: install-3-14-3
  run: |
    python --version | grep 'Python 3\.14\.3'
    pip --version | grep 'pip 25\.2 '

- key: install-3-14-3--test-pip-install
  use: install-3-14-3
  run: |
    pip install virtualenv
    which virtualenv
    virtualenv --version

