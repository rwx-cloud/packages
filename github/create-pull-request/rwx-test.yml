base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: gh-cli
    call: github/install-cli 1.0.8

  - key: code
    call: git/clone 2.0.0
    with:
      repository: https://github.com/rwx-cloud/mint-update-leaves-testing.git
      ref: main
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      preserve-git-dir: true

  - key: code-change
    use: code
    cache: false
    run: |
      nonce=$(date +%s)
      echo "$nonce" | tee $RWX_VALUES/nonce
      file="${nonce}.txt"
      echo "$file" | tee $RWX_VALUES/file
      touch "$file"

  - key: code-change2
    after: code-change
    use: code
    cache: false
    run: |
      # needs to happen at least 1 second after code-change
      sleep 1
      nonce=$(date +%s)
      file="${nonce}.txt"
      echo "$file" | tee $RWX_VALUES/file
      touch "$file"

  - key: create-pr
    call: ${{ init.package-digest }}
    use: code-change
    with:
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      branch-prefix: ${{ run.id }}
      pull-request-title: "pull request title ${{ tasks.code-change.values.nonce }}"
      pull-request-body: "pull request body ${{ tasks.code-change.values.nonce }}"

  - key: update-pr
    after: assert--create-pr
    call: ${{ init.package-digest }}
    use: code-change2
    with:
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      branch-prefix: ${{ run.id }}
      pull-request-title: "pull request title ${{ tasks.code-change.values.nonce }}"
      pull-request-body: "pull request body ${{ tasks.code-change.values.nonce }}"

  - key: clone-branch-after-create
    call: git/clone 2.0.0
    with:
      repository: https://github.com/rwx-cloud/mint-update-leaves-testing.git
      ref: ${{ tasks.create-pr.values.branch }}
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      preserve-git-dir: true

  - key: clone-branch-after-update
    call: git/clone 2.0.0
    with:
      repository: https://github.com/rwx-cloud/mint-update-leaves-testing.git
      ref: ${{ tasks.update-pr.values.branch }}
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      preserve-git-dir: true

  - key: assert--create-pr
    after: create-pr
    use: [gh-cli, clone-branch-after-create]
    run: |
      echo "Checking for added file"
      test -f ${{ tasks.code-change.values.file }}

      pr_details=$(gh --repo rwx-cloud/mint-update-leaves-testing pr view "$PR_NUMBER" --json body,title,commits)
      echo "$pr_details"

      pr_title=$(echo "$pr_details" | jq -r '.title')
      test "$pr_title" = "pull request title ${{ tasks.code-change.values.nonce }}"

      pr_body=$(echo "$pr_details" | jq -r '.body')
      test "$pr_body" = "pull request body ${{ tasks.code-change.values.nonce }}"

      commit_count="$(echo "$pr_details" | jq '.commits | length')"
      if [ "$commit_count" != 1 ]; then
        echo "PR #${PR_NUMBER} has $commit_count commits, expected 1"
        exit 1
      fi
    env:
      GITHUB_TOKEN: ${{ github-apps.rwx-cloud-bot.token }}
      PR_NUMBER: ${{ tasks.create-pr.values.pull-request-number }}

  - key: assert--update-pr
    after: update-pr
    use: [gh-cli, clone-branch-after-update]
    run: |
      echo "Checking to ensure original file not present"
      test ! -f ${{ tasks.code-change.values.file }}

      echo "Checking for file added in update"
      test -f ${{ tasks.code-change2.values.file }}

      pr_details=$(gh --repo rwx-cloud/mint-update-leaves-testing pr view "$PR_NUMBER" --json body,title,commits)
      echo "$pr_details"

      pr_title=$(echo "$pr_details" | jq -r '.title')
      test "$pr_title" = "pull request title ${{ tasks.code-change.values.nonce }}"

      pr_body=$(echo "$pr_details" | jq -r '.body')
      test "$pr_body" = "pull request body ${{ tasks.code-change.values.nonce }}"

      commit_count="$(echo "$pr_details" | jq '.commits | length')"
      if [ "$commit_count" != 1 ]; then
        echo "PR #${PR_NUMBER} has $commit_count commits, expected 1"
        exit 1
      fi

      echo "Checking for updated PR"
      test "${{ tasks.create-pr.values.pull-request-number }}" = "${{ tasks.update-pr.values.pull-request-number }}"
    env:
      GITHUB_TOKEN: ${{ github-apps.rwx-cloud-bot.token }}
      PR_NUMBER: ${{ tasks.create-pr.values.pull-request-number }}

  - key: close-pr
    after: assert--update-pr
    use: gh-cli
    run: gh --repo rwx-cloud/mint-update-leaves-testing pr close "$PR_NUMBER" --delete-branch
    env:
      GITHUB_TOKEN: ${{ github-apps.rwx-cloud-bot.token }}
      PR_NUMBER: ${{ tasks.create-pr.values.pull-request-number }}

  - key: code-change-auto-merge
    after: code-change2
    use: code
    cache: false
    run: |
      # needs a unique-per-second nonce vs. other code-change tasks
      sleep 1
      nonce=$(date +%s)
      echo "$nonce" | tee $RWX_VALUES/nonce
      file="${nonce}.txt"
      echo "$file" | tee $RWX_VALUES/file
      touch "$file"

  - key: create-pr-auto-merge
    after: close-pr
    call: ${{ init.package-digest }}
    use: code-change-auto-merge
    with:
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      branch-prefix: ${{ run.id }}-am
      pull-request-title: "auto-merge test ${{ tasks.code-change-auto-merge.values.nonce }}"
      pull-request-body: "auto-merge test ${{ tasks.code-change-auto-merge.values.nonce }}"
      enable-auto-merge: true

  - key: assert--auto-merge
    after: create-pr-auto-merge
    use: gh-cli
    run: |
      pr_details=$(gh --repo rwx-cloud/mint-update-leaves-testing pr view "$PR_NUMBER" --json autoMergeRequest)
      echo "$pr_details"

      auto_merge_enabled=$(echo "$pr_details" | jq -r '.autoMergeRequest != null')
      if [ "$auto_merge_enabled" != "true" ]; then
        >&2 echo "Auto-merge is not enabled on PR #${PR_NUMBER}"
        exit 1
      fi

      merge_method=$(echo "$pr_details" | jq -r '.autoMergeRequest.mergeMethod')
      if [ "$merge_method" != "SQUASH" ]; then
        >&2 echo "Expected SQUASH merge method, got \"$merge_method\""
        exit 1
      fi

      gh --repo rwx-cloud/mint-update-leaves-testing pr close "$PR_NUMBER" --delete-branch
    env:
      GITHUB_TOKEN: ${{ github-apps.rwx-cloud-bot.token }}
      PR_NUMBER: ${{ tasks.create-pr-auto-merge.values.pull-request-number }}

  - key: code-change-reviewers
    after: code-change-auto-merge
    use: code
    cache: false
    run: |
      # needs a unique-per-second nonce vs. other code-change tasks
      sleep 1
      nonce=$(date +%s)
      echo "$nonce" | tee $RWX_VALUES/nonce
      file="${nonce}.txt"
      echo "$file" | tee $RWX_VALUES/file
      touch "$file"

  - key: create-pr-reviewers
    after: assert--auto-merge
    call: ${{ init.package-digest }}
    use: code-change-reviewers
    with:
      github-token: ${{ github-apps.rwx-cloud-bot.token }}
      branch-prefix: ${{ run.id }}-rv
      pull-request-title: "reviewer test ${{ tasks.code-change-reviewers.values.nonce }}"
      pull-request-body: "reviewer test ${{ tasks.code-change-reviewers.values.nonce }}"
      reviewers: robinaugh

  - key: assert--reviewers
    after: create-pr-reviewers
    use: gh-cli
    run: |
      pr_details=$(gh --repo rwx-cloud/mint-update-leaves-testing pr view "$PR_NUMBER" --json reviewRequests)
      echo "$pr_details"

      requested=$(echo "$pr_details" | jq -r '[.reviewRequests[].login] | join(",")')
      if ! echo "$requested" | grep -q "robinaugh"; then
        >&2 echo "Expected robinaugh in reviewRequests on PR #${PR_NUMBER}, got \"$requested\""
        exit 1
      fi

      gh --repo rwx-cloud/mint-update-leaves-testing pr close "$PR_NUMBER" --delete-branch
    env:
      GITHUB_TOKEN: ${{ github-apps.rwx-cloud-bot.token }}
      PR_NUMBER: ${{ tasks.create-pr-reviewers.values.pull-request-number }}
