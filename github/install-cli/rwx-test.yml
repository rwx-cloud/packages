base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: system-packages
    run: |
      # On bases with `config: none` the RWX tooling (curl, sudo, ...) is not
      # installed and the run executes as root. The package downloads the apt
      # keyring with curl but does not install curl itself, so ensure it is
      # present.
      if ! command -v curl >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then
          apt-get -y update
          apt-get -y install curl ca-certificates
          apt-get -y clean
        else
          echo "Unsupported package manager; need curl installed" >&2
          exit 1
        fi
      fi

  - key: test-default
    use: system-packages
    call: ${{ init.package-digest }}

  - key: test-default--assert
    use: test-default
    run: gh --version | grep 'gh version'
