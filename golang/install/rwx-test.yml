base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: system-packages
    run: |
      # On bases with `config: none` the RWX tooling (curl, sudo, ...) is not
      # installed and the run executes as root. The package uses curl and jq to
      # resolve and download Go, and `go install` may shell out to git, so
      # ensure they are present.
      if ! command -v curl >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1 || ! command -v git >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then
          apt-get -y update
          apt-get -y install curl ca-certificates jq git
          apt-get -y clean
        else
          echo "Unsupported package manager; need curl, jq, and git installed" >&2
          exit 1
        fi
      fi

  - key: install-1-20
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      go-version: "1.20"

  - key: install-1-20--assert
    use: install-1-20
    run: go version | grep 1.20

  - key: install-old-version
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      go-version: "1.8"

  - key: install-old-version--assert
    use: install-old-version
    run: go version | grep 1.8

  - key: install-patch-version
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      go-version: "1.20.14"

  - key: install-patch-version--assert
    use: install-patch-version
    run: go version | grep 1.20.14

  - key: install-1-23-4
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      go-version: "1.23.4"

  - key: install-1-23-4--assert
    use: install-1-23-4
    run: go version | grep "1\.23\.4"

  - key: can-install-tools-and-use-them
    use: install-1-23-4
    run: |
      go install gotest.tools/gotestsum@latest
      gotestsum --version
