base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: go-1-20
    call: golang/install 1.2.0
    with:
      go-version: "1.20"

  - key: go-1-21
    call: golang/install 1.2.0
    with:
      go-version: "1.21"

  - key: go-1-22
    call: golang/install 1.2.0
    with:
      go-version: "1.22"

  - key: go-1-23
    call: golang/install 1.2.0
    with:
      go-version: "1.23"

  - key: go-1-24
    call: golang/install 1.2.0
    with:
      go-version: "1.24"

  - key: go-1-25
    call: golang/install 1.2.0
    with:
      go-version: "1.25"

  - key: code-1-20
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.20

      require golang.org/x/text v0.21.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:L8rBOAiSsKbhCdtrCy+Yj8hCg8RypYCqPGfX89WFQY=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF

  - key: code-1-21
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.21

      require golang.org/x/text v0.21.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:L8rBOAiSsKbhCdtrCy+Yj8hCg8RypYCqPGfX89WFQY=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF

  - key: code-1-22
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.22

      require golang.org/x/text v0.21.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:L8rBOAiSsKbhCdtrCy+Yj8hCg8RypYCqPGfX89WFQY=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF

  - key: code-1-23
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.23

      require golang.org/x/text v0.21.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:L8rBOAiSsKbhCdtrCy+Yj8hCg8RypYCqPGfX89WFQY=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF

  - key: code-1-24
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.24

      require golang.org/x/text v0.21.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:L8rBOAiSsKbhCdtrCy+Yj8hCg8RypYCqPGfX89WFQY=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF

  - key: code-1-25
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.25

      require golang.org/x/text v0.21.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:L8rBOAiSsKbhCdtrCy+Yj8hCg8RypYCqPGfX89WFQY=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF

  - key: code-local-replace
    run: |
      mkdir localdep
      cat > go.mod << 'EOF'
      module test

      go 1.25

      require example.com/localdep v0.0.0

      replace example.com/localdep => ./localdep
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:zyQAAkrwaneQ066sspRyJaG9VNi/YJ1NfzcGB3hZ/qo=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF
      cat > localdep/go.mod << 'EOF'
      module example.com/localdep

      go 1.25

      require golang.org/x/text v0.21.0
      EOF

  - key: code-remote-replace
    run: |
      cat > go.mod << 'EOF'
      module test

      go 1.25

      require rsc.io/quote v1.5.2

      replace rsc.io/quote => rsc.io/sampler v1.3.0
      EOF
      cat > go.sum << 'EOF'
      golang.org/x/text v0.0.0-20170915032832-14c0d48ead0c h1:qgOY6WgZOaTkIIMiVjBQcw93ERBE4m30iBm00nkL0i8=
      golang.org/x/text v0.0.0-20170915032832-14c0d48ead0c/go.mod h1:NqM8EUOU14njkJ3fqMW+pc6Ldnwhi/IjpwHt7yyuwOQ=
      rsc.io/sampler v1.3.0 h1:7uVkIFmeBqHfdjD+gZwtXXI+RODJ2Wc4O7MPEh/QiW4=
      rsc.io/sampler v1.3.0/go.mod h1:T1hPZKmBbMNahiBKFy5HrXp6adAjACjK9JXDnKaTXpA=
      EOF

  - key: code-all-local
    run: |
      mkdir localdep
      cat > go.mod << 'EOF'
      module test

      go 1.25

      require example.com/localdep v0.0.0

      replace example.com/localdep => ./localdep
      EOF
      cat > localdep/go.mod << 'EOF'
      module example.com/localdep

      go 1.25
      EOF

  - key: code-workspace-replace
    run: |
      mkdir app lib
      cat > app/go.mod << 'EOF'
      module example.com/app

      go 1.25

      require example.com/lib v0.0.0
      EOF
      cat > app/go.sum << 'EOF'
      golang.org/x/text v0.21.0 h1:zyQAAkrwaneQ066sspRyJaG9VNi/YJ1NfzcGB3hZ/qo=
      golang.org/x/text v0.21.0/go.mod h1:4IBbMaMmOPCJ8SecivzSH54+73PCFmPWxNTLm+vZkEQ=
      EOF
      cat > lib/go.mod << 'EOF'
      module example.com/lib

      go 1.25

      require golang.org/x/text v0.21.0
      EOF
      cat > go.work << 'EOF'
      go 1.25

      use (
        ./app
      )

      replace example.com/lib v0.0.0 => ./lib
      EOF

  - key: mod-download--test-go-1-20
    use: [go-1-20, code-1-20]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-1-20

  - key: mod-download--test-go-1-20--assert
    use: mod-download--test-go-1-20
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-go-1-21
    use: [go-1-21, code-1-21]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-1-21

  - key: mod-download--test-go-1-21--assert
    use: mod-download--test-go-1-21
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-go-1-22
    use: [go-1-22, code-1-22]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-1-22

  - key: mod-download--test-go-1-22--assert
    use: mod-download--test-go-1-22
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-go-1-23
    use: [go-1-23, code-1-23]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-1-23

  - key: mod-download--test-go-1-23--assert
    use: mod-download--test-go-1-23
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-go-1-24
    use: [go-1-24, code-1-24]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-1-24

  - key: mod-download--test-go-1-24--assert
    use: mod-download--test-go-1-24
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-go-1-25
    use: [go-1-25, code-1-25]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-1-25

  - key: mod-download--test-go-1-25--assert
    use: mod-download--test-go-1-25
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-local-replace
    use: [go-1-25, code-local-replace]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-local-replace

  - key: mod-download--test-local-replace--assert
    use: mod-download--test-local-replace
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"

  - key: mod-download--test-remote-replace
    use: [go-1-25, code-remote-replace]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-remote-replace

  - key: mod-download--test-remote-replace--assert
    use: mod-download--test-remote-replace
    run: |
      test -d "$(go env GOMODCACHE)/rsc.io/sampler@v1.3.0"

  - key: mod-download--test-all-local
    use: [go-1-25, code-all-local]
    call: ${{ init.package-digest }}
    with:
      tool-cache: golang-mod-download-all-local

  - key: mod-download--test-all-local--assert
    use: mod-download--test-all-local
    run: |
      test -f "$(go env GOMODCACHE)/.rwx-mod-download.json"
      test ! -s "$(go env GOMODCACHE)/.rwx-mod-download.json"

  - key: mod-download--test-workspace-replace
    use: [go-1-25, code-workspace-replace]
    call: ${{ init.package-digest }}
    with:
      path: app
      tool-cache: golang-mod-download-workspace-replace

  - key: mod-download--test-workspace-replace--assert
    use: mod-download--test-workspace-replace
    run: |
      test -d "$(go env GOMODCACHE)/golang.org/x/text@v0.21.0"
