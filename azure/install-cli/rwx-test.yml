base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: system-packages
    run: |
      # On bases with `config: none` the RWX tooling (curl, sudo, ...) is not
      # installed and the run executes as root. The package installs its own apt
      # dependencies, but the assertions below use jq, so ensure it is present.
      if ! command -v jq >/dev/null 2>&1; then
        if command -v apt-get >/dev/null 2>&1; then
          apt-get -y update
          apt-get -y install jq ca-certificates
          apt-get -y clean
        else
          echo "Unsupported package manager; need jq installed" >&2
          exit 1
        fi
      fi

  - key: test-default
    use: system-packages
    call: ${{ init.package-digest }}

  - key: test-default--assert
    use: test-default
    run: az version | jq -r '."azure-cli"' | grep '^[0-9.]\+$'

  - key: test-specified
    use: system-packages
    call: ${{ init.package-digest }}
    with:
      version: "2.64.0"

  - key: test-specified--assert
    use: test-specified
    run: az version | jq -e '."azure-cli" == "2.64.0"'
