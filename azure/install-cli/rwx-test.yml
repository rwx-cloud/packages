base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: test-default
    call: ${{ init.package-digest }}

  - key: test-default--assert
    use: test-default
    run: az version | jq -r '."azure-cli"' | grep '^[0-9.]\+$'

  - key: test-specified
    call: ${{ init.package-digest }}
    with:
      version: "2.64.0"

  - key: test-specified--assert
    use: test-specified
    run: az version | jq -e '."azure-cli" == "2.64.0"'
