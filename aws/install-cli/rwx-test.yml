base:
  image: ${{ init.base-image }}
  config: ${{ init.base-config }}
  arch: ${{ init.base-arch }}

tasks:
  - key: system-packages
    run: |
      if ! command -v curl >/dev/null 2>&1 || ! command -v unzip >/dev/null 2>&1 || ! command -v gpg >/dev/null 2>&1; then
        if command -v apk >/dev/null 2>&1; then
          apk add --no-cache curl unzip gnupg
        elif command -v apt-get >/dev/null 2>&1; then
          apt-get -y update
          apt-get -y install curl unzip gnupg
          apt-get clean
        else
          echo "Unsupported package manager; need curl, unzip, and gpg installed" >&2
          exit 1
        fi
      fi

  - key: test-default
    call: ${{ init.package-digest }}
    use: system-packages

  - key: test-default--assert
    use: test-default
    run: aws --version | grep 'aws-cli/2\.'

  - key: test-specified
    call: ${{ init.package-digest }}
    use: system-packages
    with:
      cli-version: "2.0.30"

  - key: test-specified--assert
    use: test-specified
    run: aws --version | grep 'aws-cli/2\.0\.30'
